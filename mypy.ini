[mypy]
python_version = 3.13
mypy_path = my_django_setup/myproject
plugins = mypy_django_plugin.main
ignore_missing_imports = true
warn_unused_configs = true
exclude = (?x)(migrations/|\.venv/)

[mypy.plugins.django-stubs]
django_settings_module = myproject.settings

# Opt in gradually: set ignore_errors = false per package when ready.
[mypy-home.*]
ignore_errors = true

[mypy-designer.*]
ignore_errors = true

[mypy-manufacturer.*]
ignore_errors = true

# First strictly checked module (override manufacturer.*).
[mypy-manufacturer.services]
ignore_errors = false

[mypy-customer.*]
ignore_errors = true

[mypy-myproject.*]
ignore_errors = true
