<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stremet | Staff Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            background-color: #f4f6f9; 
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .login-card {
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border-top: 5px solid #2c3e50;
            width: 100%;
            max-width: 450px;
            background-color: white;
            padding: 40px;
        }
        .btn-login {
            background-color: #2c3e50;
            color: white;
            font-weight: bold;
        }
        .btn-login:hover {
            background-color: #1a252f;
            color: white;
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="text-center mb-4">
        <h2 class="fw-bold" style="color: #2c3e50;">Stremet Sign In</h2>
        <p class="text-muted mb-0">Staff, designer, manufacturer, or <strong>customer</strong> (quote request).</p>
        <p class="text-muted small">Customers are sent to the quote form after login.</p>
    </div>

    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }} alert-dismissible fade show shadow-sm" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
        {% endfor %}
    {% endif %}

<form method="POST" action="{% url 'login' %}">        {% csrf_token %}
        
        <div class="mb-4">
            <label for="username" class="form-label fw-bold">Username</label>
            <input type="text" class="form-control form-control-lg bg-light" id="username" name="username" placeholder="Enter your username" required autofocus>
        </div>
        
        <div class="mb-4">
            <label for="password" class="form-label fw-bold">Password</label>
            <input type="password" class="form-control form-control-lg bg-light" id="password" name="password" placeholder="Enter your password" required>
        </div>
        
        <div class="d-grid mt-4 mb-3">
            <button type="submit" class="btn btn-login btn-lg">Log In</button>
        </div>
        
        <div class="text-center">
            <a href="{% url 'home_dashboard' %}" class="text-decoration-none text-muted small">← Back to Main Menu</a>
        </div>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
