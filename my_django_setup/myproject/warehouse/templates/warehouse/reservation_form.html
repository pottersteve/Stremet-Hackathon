{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New item reservation</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'warehouse/css/wh.css' %}">
</head>
<body>
{% include 'home/includes/portal_nav_bar.html' %}
<nav class="navbar navbar-dark wh-header mb-4">
    {% include 'warehouse/includes/subnav.html' %}
</nav>
<p class="container mb-0"><a href="{% url 'warehouse_store' %}" class="text-muted small">&larr; Back to store</a></p>
<div class="container" style="max-width:560px;">
    <h4>New item reservation</h4>
    <form method="post" class="card card-body shadow-sm mt-3">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Create</button>
    </form>
</div>
</body>
</html>
