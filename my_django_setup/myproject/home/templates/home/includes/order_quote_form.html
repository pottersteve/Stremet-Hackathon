{# Shared new-order / quote form. Expects: form_action, submit_name, notes_label #}
<form action="{{ form_action }}" method="POST" enctype="multipart/form-data">
    {% csrf_token %}
    <div class="row">
        <div class="col-lg-7">
            <div class="card section-card">
                <div class="card-header bg-light fw-bold">1. Client &amp; Order Details</div>
                <div class="card-body">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Order ID</label>
                            <input type="text" class="form-control" name="order_id" placeholder="e.g., ORD-2026-8991" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Client Company</label>
                            <input type="text" class="form-control" name="company_name" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Contact Email</label>
                            <input type="email" class="form-control" name="client_email" value="{{ default_client_email|default:'' }}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Target Delivery Date</label>
                            <input type="date" class="form-control" name="target_delivery" required>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card section-card">
                <div class="card-header bg-light fw-bold">2. Technical Specifications</div>
                <div class="card-body">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Steel Grade</label>
                            <select class="form-select" name="steel_grade">
                                <option value="304_ss">304 Stainless Steel</option>
                                <option value="316_ss">316 Marine Grade Stainless</option>
                                <option value="a36_carbon">A36 Mild Carbon Steel</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Product Form</label>
                            <select class="form-select" name="product_form">
                                <option value="plate">Plate / Sheet</option>
                                <option value="coil">Rolled Coil</option>
                                <option value="bar">Structural Bar</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Thickness (mm)</label>
                            <input type="number" step="0.01" class="form-control" name="dim_thickness">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Width (mm)</label>
                            <input type="number" step="0.01" class="form-control" name="dim_width">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Length (mm)</label>
                            <input type="number" step="0.01" class="form-control" name="dim_length">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Total Qty (Metric Tons)</label>
                            <input type="number" step="0.1" class="form-control" name="quantity_tons" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Surface Finish</label>
                            <select class="form-select" name="surface_finish">
                                <option value="hot_rolled">Hot Rolled (HR)</option>
                                <option value="cold_rolled">Cold Rolled (CR)</option>
                            </select>
                        </div>
                    </div>
                    <hr class="my-4">
                    <div class="mb-3">
                        <label class="form-label fw-bold d-block">Processing &amp; Testing</label>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="checkbox" name="heat_treatment" value="yes" id="qt_heat">
                            <label class="form-check-label" for="qt_heat">Heat Treatment</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="checkbox" name="ultrasonic_test" value="yes" id="qt_us">
                            <label class="form-check-label" for="qt_us">Ultrasonic Testing</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="checkbox" name="mill_certificate" value="yes" id="qt_mill">
                            <label class="form-check-label" for="qt_mill">Mill Certificate</label>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-lg-5">
            <div class="card section-card">
                <div class="card-header bg-light fw-bold">3. Blueprints &amp; Files</div>
                <div class="card-body">
                    <div class="mb-3">
                        <label class="form-label">Upload CAD (.pdf, .dwg)</label>
                        <input class="form-control" type="file" name="blueprint_file" accept=".pdf,.dwg,.dxf">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Reference images (optional)</label>
                        <input class="form-control" type="file" name="reference_images" accept="image/*" multiple>
                    </div>
                </div>
            </div>
            <div class="card section-card">
                <div class="card-header bg-light fw-bold">4. {{ notes_label|default:"Notes" }}</div>
                <div class="card-body">
                    <textarea class="form-control" name="admin_notes" rows="3" placeholder="Additional requirements or context"></textarea>
                </div>
            </div>
            <div class="d-grid gap-2">
                <button type="submit" name="{{ submit_name }}" value="1" class="btn btn-primary btn-lg">{{ submit_button_label|default:"Submit quote request" }}</button>
            </div>
        </div>
    </div>
</form>
