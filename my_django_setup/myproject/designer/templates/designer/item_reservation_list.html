{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Item reservations</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'designer/css/designer.css' %}">
</head>
<body>
{% include 'home/includes/portal_nav_bar.html' %}
<nav class="navbar navbar-dark designer-header mb-4">
    <div class="container d-flex justify-content-between">
        <span class="navbar-brand mb-0">Item reservations</span>
        <div>
            <a href="{% url 'designer_item_reservation_create' %}" class="btn btn-light btn-sm me-2">New</a>
            <a href="{% url 'designer_dashboard' %}" class="btn btn-outline-light btn-sm">Dashboard</a>
        </div>
    </div>
</nav>
<div class="container">
    <table class="table table-sm">
        <thead><tr><th>Name</th><th>SKU</th><th>Description</th></tr></thead>
        <tbody>
            {% for r in reservations %}
            <tr>
                <td>{{ r.name }}</td>
                <td>{{ r.sku|default:"—" }}</td>
                <td><small class="text-muted">{{ r.description|truncatewords:20 }}</small></td>
            </tr>
            {% empty %}
            <tr><td colspan="3" class="text-muted">No reservations yet.</td></tr>
            {% endfor %}
        </tbody>
    </table>
</div>
</body>
</html>
