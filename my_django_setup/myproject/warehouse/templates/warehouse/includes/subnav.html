<div class="container d-flex justify-content-between align-items-center flex-wrap gap-2">
    <span class="navbar-brand mb-0 h4">
        <a href="{% url 'warehouse_dashboard' %}" class="text-white text-decoration-none">Warehouse</a>
    </span>
    <div class="d-flex align-items-center gap-2 flex-wrap">
        <a href="{% url 'warehouse_store' %}" class="btn btn-sm {% if wh_nav_active == 'store' %}btn-light{% else %}btn-outline-light{% endif %}">Store items</a>
        <a href="{% url 'warehouse_pickup_queue' %}" class="btn btn-sm {% if wh_nav_active == 'pickup' %}btn-light{% else %}btn-outline-light{% endif %}">Pickup queue</a>
        <a href="{% url 'warehouse_inventory' %}" class="btn btn-sm {% if wh_nav_active == 'inventory' %}btn-light{% else %}btn-outline-light{% endif %}">Inventory</a>
        <a href="{% url 'warehouse_reservation_create' %}" class="btn btn-sm btn-outline-light">New reservation</a>
        <span class="text-light me-2">{{ request.user.username }}</span>
        <a href="{% url 'logout' %}" class="btn btn-outline-light btn-sm">Logout</a>
    </div>
</div>
